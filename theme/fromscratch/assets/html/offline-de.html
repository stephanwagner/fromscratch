<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kein Internet</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        font-size: 16px;
        line-height: 1.5;
        color: #1e293b;
        background: #f1f5f9;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      }

      .box {
        max-width: 360px;
        padding: 24px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        text-align: center;
        text-wrap: balance;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
      }

      p {
        margin: 8px 0 0;
        color: #64748b;
        font-size: 15px;
      }

      a {
        color: #2b6cb0;
        text-decoration: none;
        font-size: 15px;
      }

      a:hover {
        color: #2b6cb0;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Du bist offline</h1>
      <p>Prüfe deine Internetverbindung und versuche es erneut.</p>
      <p><a href="javascript:window.location.reload()">Neu laden</a></p>
    </div>
  </body>
</html>
